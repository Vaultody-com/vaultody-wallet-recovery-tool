name: Build and Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - test-release-workflow  # TODO: remove before merging to master
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build Linux AppImage
        run: npm run dist:linux

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/*.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run dist:windows

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/*.exe

  build-mac:
    # macos-latest is Apple Silicon (M1/M2/M3); --universal builds a fat binary for both Intel and Apple Silicon
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS DMG (universal - Intel + Apple Silicon)
        run: npx electron-builder --mac --universal

      - uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/*.dmg

  release:
    needs: [build-linux, build-windows, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('test-{0}', github.run_id) || github.ref_name }}
          draft: true
          prerelease: ${{ github.event_name == 'workflow_dispatch' }}
          files: dist/*
          generate_release_notes: true
